version: "3.9"

# ============================================================
# RFID Transfers Backend — Stack de desarrollo completo
# Servicios: PostgreSQL 16 · Redis 7 · Kafka 3.7 (KRaft) · Keycloak 25
#            transfer-api · read-tag-service · validation-service · realtime-service
# Uso: docker compose up -d
# ============================================================

networks:
  rfid-net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  kafka_data:
  keycloak_data:

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rfid-postgres
    restart: unless-stopped
    networks: [rfid-net]
    environment:
      POSTGRES_DB:       rfid_transfers
      POSTGRES_USER:     rfid_app
      POSTGRES_PASSWORD: rfid_pass
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rfid_app -d rfid_transfers"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis 7 ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rfid-redis
    restart: unless-stopped
    networks: [rfid-net]
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Apache Kafka 3.7 (modo KRaft — sin ZooKeeper) ─────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: rfid-kafka
    restart: unless-stopped
    networks: [rfid-net]
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Kafka UI (herramienta de administración) ──────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: rfid-kafka-ui
    restart: unless-stopped
    networks: [rfid-net]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: rfid-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"

  # ── Keycloak 25 (OAuth 2.0 / JWT) ────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: rfid-keycloak
    restart: unless-stopped
    networks: [rfid-net]
    environment:
      KEYCLOAK_ADMIN:          admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_DB:                   dev-mem   # usar PostgreSQL en producción
      KC_HOSTNAME_STRICT:      "false"
      KC_HTTP_ENABLED:         "true"
    command: ["start-dev", "--import-realm"]
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/realm-rfid.json:/opt/keycloak/data/import/realm-rfid.json:ro
    ports:
      - "8180:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Transfer API (Spring Boot) ────────────────────────────────
  transfer-api:
    build:
      context: .
      dockerfile: transfer-api/Dockerfile
    container_name: rfid-transfer-api
    restart: unless-stopped
    networks: [rfid-net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      #keycloak:
      #  condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE:      "dev"
      DB_HOST:                     postgres
      DB_PORT:                     5432
      DB_NAME:                     rfid_transfers
      DB_USER:                     rfid_app
      DB_PASSWORD:                 rfid_pass
      REDIS_HOST:                  redis
      REDIS_PORT:                  6379
      KAFKA_BOOTSTRAP_SERVERS:     kafka:9092
      JWT_ISSUER_URI:              http://keycloak:8080/realms/rfid-realm
      JWT_JWK_SET_URI:             http://keycloak:8080/realms/rfid-realm/protocol/openid-connect/certs
      SERVER_PORT:                 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ── Read Tag Service (Sprint 2) ───────────────────────────────
  read-tag-service:
    build:
      context: .
      dockerfile: read-tag-service/Dockerfile
    container_name: rfid-read-tag
    restart: unless-stopped
    networks: [rfid-net]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_URL:           jdbc:postgresql://postgres:5432/rfid_transfers
      DB_USER:          rfid_app
      DB_PASS:          rfid_pass
      KAFKA_BOOTSTRAP:  kafka:9092
      SERVER_PORT:      8082
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── Validation Service (Sprint 2) ─────────────────────────────
  validation-service:
    build:
      context: .
      dockerfile: validation-service/Dockerfile
    container_name: rfid-validation
    restart: unless-stopped
    networks: [rfid-net]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL:           jdbc:postgresql://postgres:5432/rfid_transfers
      DB_USER:          rfid_app
      DB_PASS:          rfid_pass
      KAFKA_BOOTSTRAP:  kafka:9092
      REDIS_HOST:       redis
      REDIS_PORT:       6379
      SERVER_PORT:      8083
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ── Realtime Service (Sprint 5 T2) — Node.js 22 + Socket.IO ──
  realtime-service:
    build:
      context: ./realtime-service
      dockerfile: Dockerfile
      target: production
    container_name: rfid-realtime
    restart: unless-stopped
    networks: [rfid-net]
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP:        kafka:9092
      REDIS_HOST:             redis
      REDIS_PORT:             6379
      PORT:                   3001
      CORS_ORIGIN:            "*"
      REDIS_SYNC_INTERVAL_MS: 30000
      NODE_ENV:               production
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
  # ── Webhook Mock (Sprint 5 T3) — Receptor simulado del WMS/ERP ──
  webhook-mock:
    build:
      context: ./webhook-mock
      dockerfile: Dockerfile
    container_name: rfid-webhook-mock
    restart: unless-stopped
    networks: [rfid-net]
    environment:
      PORT: "3003"
      WEBHOOK_HMAC_SECRET: "rfid-hmac-secret-dev"
    ports:
      - "3003:3003"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Alert Service (Sprint 5 T3) — Detecta anomalías y llama webhook ──
  alert-service:
    build:
      context: ./alert-service
      dockerfile: Dockerfile
    container_name: rfid-alert
    restart: unless-stopped
    networks: [rfid-net]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      webhook-mock:
        condition: service_healthy
    environment:
      PORT:                   "3002"
      KAFKA_BOOTSTRAP:        kafka:9092
      DB_URL:                 postgresql://rfid_app:rfid_pass@postgres:5432/rfid_transfers
      WEBHOOK_URL:            http://webhook-mock:3003/webhook
      WEBHOOK_HMAC_SECRET:    rfid-hmac-secret-dev
      WEBHOOK_TIMEOUT_MS:     "5000"
      WEBHOOK_MAX_RETRIES:    "3"
      LOG_LEVEL:              info
      NODE_ENV:               production
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s
