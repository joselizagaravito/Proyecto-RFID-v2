spring:
  application:
    name: transfer-api

  # ── Base de Datos (PostgreSQL 16) ──────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:rfid_transfers}
    username: ${DB_USER:rfid_app}
    password: ${DB_PASSWORD:rfid_pass}
    hikari:
      pool-name: transfer-api-pool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ── JPA / Hibernate ───────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway controla el esquema; Hibernate solo valida
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc:
          time_zone: UTC

  # ── Flyway ───────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    ignore-migration-patterns: "*:ignored,*:missing"
    out-of-order: false

  # ── Redis (caché de estado en vivo) ──────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          min-idle: 2

  # ── Kafka ────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: transfer-api-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.pystelectronic.rfid.*"

  # ── Security (OAuth2 Resource Server / JWT) ──────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWT_JWK_SET_URI:http://keycloak:8080/auth/realms/rfid-realm/protocol/openid-connect/certs}

  # ── Jackson ──────────────────────────────────────────────────
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: UTC

# ── Server ───────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json
  error:
    include-message: never     # No exponer mensajes internos en producción
    include-stacktrace: never
    include-binding-errors: never

# ── Actuator ─────────────────────────────────────────────────────
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  info:
    app:
      name: transfer-api
      version: 1.0.0-SNAPSHOT

# ── SpringDoc OpenAPI ────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
  default-produces-media-type: application/json

# ── Logging ──────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.pystelectronic.rfid: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
    org.hibernate.SQL: WARN
    org.apache.kafka: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{correlationId}] %logger{36} - %msg%n"

# ── Propiedades personalizadas ────────────────────────────────────
rfid:
  idempotency:
    ttl-seconds: 86400   # 24 horas de cache de idempotencia en Redis
  portal-state:
    snapshot-interval-seconds: 30
  webhooks:
    max-retries: 3
    backoff-multiplier: 3
  transfer-code:
    prefix: OT
    sequence-padding: 6

---
# ── Perfil: dev (desarrollo local) ──────────────────────────────
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          # En dev se puede usar un mock de Keycloak o deshabilitar
          issuer-uri: http://38.253.180.55:8180/auth/realms/rfid-realm

logging:
  level:
    com.pystelectronic.rfid: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

---
# ── Perfil: test (Testcontainers) ────────────────────────────────
spring:
  config:
    activate:
      on-profile: test
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: true
