# ══════════════════════════════════════════════════════════════════
# /etc/nginx/sites-available/rfid-traslados
# Nginx NATIVO del servidor Debian 12 — Sprint 6
#
# Cambios respecto al Sprint 5:
#   + Proxy /auth/ → Keycloak :8180 (NUEVO)
#   + Cabeceras de seguridad HTTP (NUEVO)
#   + Proxy /audit/ → audit-service :8084 (NUEVO, solo local)
#   = El resto de los bloques se mantienen igual
#
# Pystelectronic · Ing. José Hernán Liza Garavito
# ══════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name 38.253.180.55 _;

    # ── Cabeceras de seguridad HTTP ────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"    always;
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin" always;

    # ── Keycloak — /auth/ → :8180 ─────────────────────────────────
    # Keycloak 25 corre con KC_HTTP_RELATIVE_PATH=/auth
    # IMPORTANTE: el trailing slash en proxy_pass es necesario para
    # que Nginx reescriba el path correctamente.
    location /auth/ {
        proxy_pass         http://127.0.0.1:8180/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;

        # Buffers generosos para los payloads de login de Keycloak
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;

        # Timeout largo — el login puede tardar si Keycloak está frío
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # ── Transfer API — /api/ → :8080 ──────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Connection      "";
        proxy_read_timeout 30s;
    }

    # ── Actuator (health) — /actuator/ → transfer-api :8080 ───────
    location /actuator/ {
        proxy_pass         http://127.0.0.1:8080/actuator/;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Connection      "";
    }

    # ── Read Tag Service — /api/v1/read-tags también pasa por :8082
    # NOTA: Si el read-tag-service tiene su propia ruta /api/v1/read-tags,
    # descomentar el bloque de abajo y ajustar según la configuración real.
    # location /read-tags/ {
    #     proxy_pass http://127.0.0.1:8082/api/v1/read-tags/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # }

    # ── Audit Service — /audit/ → :8084 (acceso restringido) ──────
    # Restricción por IP: solo accesible desde el propio servidor
    location /audit/ {
        allow 127.0.0.1;
        deny  all;

        proxy_pass         http://127.0.0.1:8084/api/v1/audit-logs/;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Connection      "";
    }

    # ── Realtime Service WebSocket — /socket.io/ → :3001 ──────────
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        # WebSocket necesita timeout largo
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Kafka UI — /kafka-ui/ → :8090 ─────────────────────────────
    location /kafka-ui/ {
        proxy_pass         http://127.0.0.1:8090/;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Connection      "";
    }

    # ── Frontend SPA ───────────────────────────────────────────────
    root /var/www/rfid;

    location / {
        index rfid-transfers-app.html index.html;
        try_files $uri $uri/ /rfid-transfers-app.html;
    }

    # ── Nginx health ───────────────────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
